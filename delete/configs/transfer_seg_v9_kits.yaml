# V9 SVRL → KiTS21 Segmentation Transfer (v2: Dice+CE, class weights, 15k steps)
# 从 V9 SVRL checkpoint 提取 ViT backbone，接 SegHead fine-tune

data:
  data_root: "./data/dataset"
  train_ums_path: "./data/dataset/processed/kits_ums_train.jsonl"
  val_ums_path: "./data/dataset/processed/kits_ums_val.jsonl"
  image_size: 224
  num_workers: 4
  # Low-data subsets: 设为 null 使用全量，或 0.1/0.25/0.5
  subset_fraction: null

model:
  vit_model_name: "vit_base_patch16_224"
  vit_pretrained: true
  num_seg_classes: 4  # background + kidney + tumor + cyst

transfer:
  init_vit_checkpoint: "./outputs/v9_svrl/checkpoints/best.pt"

loss:
  class_weights: [1.0, 1.0, 2.5, 8.0]  # bg, kidney, tumor, cyst
  dice_weight: 0.5
  ce_weight: 0.5

training:
  learning_rate: 1.0e-4
  backbone_learning_rate: 1.0e-5
  head_learning_rate: 1.0e-3
  weight_decay: 0.01
  warmup_steps: 500
  max_steps: 15000
  batch_size: 8
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  log_interval: 50
  eval_interval: 500
  save_interval: 2500
  output_dir: "./outputs/transfer_seg_v9_kits_v2"

evaluation:
  metrics: ["dice", "hd95"]

seed: 42
device: "cuda:1"

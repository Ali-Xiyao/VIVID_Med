# V12: SPD + HFP + 12-label + Answerable-Focused Training
# SPD 横向多方面分解 + HFP 纵向多尺度融合
# 12 标签预训练（去掉 No Finding 和 Pleural Other）
# field_query_training: 每样本抽 4-6 个标签，重点抽低频标签
# answerability_mask: false_weight=0，屏蔽 null state tokens

data:
  data_root: "./data/dataset"
  train_ums_path: "./data/dataset/processed/chexpert_ums_train.jsonl"
  val_ums_path: "./data/dataset/processed/chexpert_ums_val.jsonl"
  selected_labels:
    - "Enlarged Cardiomediastinum"
    - "Cardiomegaly"
    - "Lung Opacity"
    - "Lung Lesion"
    - "Edema"
    - "Consolidation"
    - "Pneumonia"
    - "Atelectasis"
    - "Pneumothorax"
    - "Pleural Effusion"
    - "Fracture"
    - "Support Devices"
  image_size: 224
  max_val_samples: 1000
  num_workers: 4
  field_query_training:
    enabled: true
    k_min: 4
    k_max: 6
    focus_labels:
      - "Fracture"
      - "Pneumonia"
      - "Lung Lesion"
      - "Cardiomegaly"
      - "Enlarged Cardiomediastinum"
    focus_probability: 0.6

model:
  vit_model_name: "vit_base_patch16_224"
  vit_pretrained: true
  vit_output_type: "all"
  num_prefix_tokens: 4
  projector_mlp_hidden_dim: 1536
  projector_dropout: 0.1
  llm_model_name: "Qwen/Qwen2.5-1.5B-Instruct"

  gftm:
    enabled: false
  consistency:
    enabled: false
  sar:
    enabled: false
  hfp:
    enabled: true
    layers: [3, 7, 11]
  spd:
    enabled: true
    num_groups: 3
    tokens_per_group: 2
    ortho_weight: 0.01

training:
  learning_rate: 1.0e-4
  vit_learning_rate: 2.0e-5
  projector_learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  max_steps: 10000
  batch_size: 4
  gradient_accumulation_steps: 8
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  log_interval: 10
  eval_interval: 500
  save_interval: 1000
  output_dir: "./outputs/v12_spd_hfp_12label"
  answerability_mask:
    enabled: true
    true_weight: 1.0
    false_weight: 0.0
    scope: "findings_only"
    keep_structural_tokens: false

evaluation:
  threshold: 0.5
  uncertain_policy: "ignore"

seed: 42
device: "cuda:0"

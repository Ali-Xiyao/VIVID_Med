experiment:
  id: train_conn
  run_id: TRAIN-CONN
  route: training_policy_connector_only
  data_version: TRAIN-CONN
data:
  data_root: .
  train_instruction_path: ./outputs/instruction_data/glm_validated/d7_hard_shuffle_3k.jsonl
  val_instruction_path: ./outputs/instruction_data/glm_validated/d7_hard_shuffle_val200.jsonl
  max_length: 768
  max_val_samples: 1000
  num_workers: 0
model:
  model_path: H:/Xiyao_Wang/001_models/qwen3-vl-2b-thinking-new
  dtype: bf16
  trainable_groups:
  - visual_connector
training:
  learning_rate: 2.0e-05
  vision_learning_rate: 1.0e-05
  connector_learning_rate: 2.0e-05
  weight_decay: 0.01
  max_steps: 5000
  batch_size: 1
  eval_batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  log_interval: 25
  eval_interval: 500
  save_interval: 1000
  save_checkpoints: true
  output_dir: ./outputs/qwen3vl_instruction/next_stage/train_conn
  image_shuffle_margin:
    enabled: true
    weight: 0.1
    margin: 0.2
seed: 42
device: cuda:0

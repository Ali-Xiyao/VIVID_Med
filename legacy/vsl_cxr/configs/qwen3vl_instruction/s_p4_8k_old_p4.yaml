experiment:
  id: s_p4_8k
  run_id: S-P4-8k
  route: old_p4_step_scaling
  data_version: D3_report_grounded_qa_counterfactual

data:
  data_root: "."
  train_instruction_path: "./outputs/instruction_data/glm_validated/v3_train_validated.jsonl"
  val_instruction_path: "./outputs/instruction_data/glm_validated/v3_val_validated.jsonl"
  max_length: 768
  num_workers: 0

model:
  model_path: "H:/Xiyao_Wang/001_models/qwen3-vl-2b-thinking-new"
  dtype: "bf16"
  trainable_groups:
    - vision_tower
    - visual_connector

training:
  learning_rate: 2.0e-5
  vision_learning_rate: 1.0e-5
  connector_learning_rate: 2.0e-5
  weight_decay: 0.01
  max_steps: 8000
  batch_size: 1
  eval_batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  log_interval: 50
  eval_interval: 1000
  save_interval: 1000
  save_checkpoints: true
  output_dir: "./outputs/qwen3vl_instruction/s_p4_8k"

seed: 44
device: "cuda:0"

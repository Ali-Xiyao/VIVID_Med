# OrganAMNIST LP: SPD (ours)
# 冻结 ViT backbone，只训练线性分类头

data:
  dataset: "organamnist"
  data_root: "./data/dataset"
  npz_path: "./data/dataset/organamnist_224.npz"
  image_size: 224
  num_workers: 4

model:
  vit_model_name: "vit_base_patch16_224"
  vit_pretrained: false

transfer:
  freeze_backbone: true
  init_vit_checkpoint: "./outputs/ablation_A_ums_spd_12label/checkpoints/best.pt"

training:
  learning_rate: 1.0e-3
  head_learning_rate: 1.0e-3
  weight_decay: 0.0
  warmup_steps: 200
  max_steps: 3000
  batch_size: 16
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  bf16: true
  log_interval: 10
  eval_interval: 200
  save_interval: 600
  output_dir: "./outputs/ct_lp_organ_spd"

seed: 42
device: "cuda"

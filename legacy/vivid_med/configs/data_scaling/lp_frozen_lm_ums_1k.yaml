data:
  data_root: ./data/dataset
  train_ums_path: ./data/splits/chexpert_train_1k.jsonl
  val_ums_path: ./data/splits/chexpert_val_fixed.jsonl
  image_size: 224
  use_common_labels_only: false
  max_val_samples: 1000
  num_workers: 0
model:
  vit_model_name: vit_base_patch16_224
  vit_pretrained: true
  drop_rate: 0.0
  drop_path_rate: 0.0
transfer:
  init_vit_checkpoint: ./outputs/data_scaling/frozen_lm_ums_1k/checkpoints/best.pt
  freeze_backbone: true
training:
  learning_rate: 0.001
  backbone_learning_rate: 0.0
  head_learning_rate: 0.001
  weight_decay: 0.0
  warmup_steps: 200
  max_steps: 3000
  batch_size: 16
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  log_interval: 10
  eval_interval: 200
  save_interval: 600
  output_dir: ./outputs/data_scaling/lp_frozen_lm_ums_1k
evaluation:
  threshold: 0.5
  uncertain_policy: ignore
seed: 42
device: cuda

# Q-Former Proxy: 12-label + 结构化 JSON + 单组 cross-attention (无正交分解)
# SPD 退化版：num_groups=1, tokens_per_group=8, ortho_weight=0
# 总 token 数 = 8（与 SPD 的 4×2=8 相同），但无分组和正交约束
# 用于证明 SPD 正交分解的价值（vs 普通 Q-Former 式 cross-attention）

data:
  data_root: "./data/dataset"
  train_ums_path: "./data/dataset/processed/chexpert_ums_train.jsonl"
  val_ums_path: "./data/dataset/processed/chexpert_ums_val.jsonl"
  selected_labels:
    - "Enlarged Cardiomediastinum"
    - "Cardiomegaly"
    - "Lung Opacity"
    - "Lung Lesion"
    - "Edema"
    - "Consolidation"
    - "Pneumonia"
    - "Atelectasis"
    - "Pneumothorax"
    - "Pleural Effusion"
    - "Fracture"
    - "Support Devices"
  image_size: 224
  max_val_samples: 1000
  num_workers: 4
  target_format: "json"

model:
  vit_model_name: "vit_base_patch16_224"
  vit_pretrained: true
  vit_output_type: "all"
  num_prefix_tokens: 4
  projector_mlp_hidden_dim: 1536
  projector_dropout: 0.1
  llm_model_name: "Qwen/Qwen2.5-1.5B-Instruct"

  spd:
    enabled: true
    num_groups: 1
    tokens_per_group: 8
    ortho_weight: 0.0

training:
  learning_rate: 1.0e-4
  vit_learning_rate: 2.0e-5
  projector_learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  max_steps: 10000
  batch_size: 4
  gradient_accumulation_steps: 8
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  log_interval: 10
  eval_interval: 500
  save_interval: 1000
  output_dir: "./outputs/ablation_qformer_proxy_12label"

evaluation:
  threshold: 0.5
  uncertain_policy: "ignore"

seed: 42
device: "cuda:0"

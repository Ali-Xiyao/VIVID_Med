# Linear Probe: DINOv3 (Meta, self-supervised ViT-B/16) → CheXpert 12-label

data:
  data_root: "./data/dataset"
  train_ums_path: "./data/dataset/processed/chexpert_ums_train.jsonl"
  val_ums_path: "./data/dataset/processed/chexpert_ums_val.jsonl"
  image_size: 224
  use_common_labels_only: false
  max_val_samples: 1000
  num_workers: 4

model:
  vit_model_name: "vit_base_patch16_dinov3"
  vit_pretrained: false
  drop_rate: 0.0
  drop_path_rate: 0.0

transfer:
  init_vit_checkpoint: "./pretrained/dinov3_vit_base.pt"
  freeze_backbone: true

training:
  learning_rate: 1.0e-3
  backbone_learning_rate: 0.0
  head_learning_rate: 1.0e-3
  weight_decay: 0.0
  warmup_steps: 200
  max_steps: 3000
  batch_size: 16
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  log_interval: 10
  eval_interval: 200
  save_interval: 600
  output_dir: "./outputs/lp_dinov3_baseline"

evaluation:
  threshold: 0.5
  uncertain_policy: "ignore"

seed: 42
device: "cuda"

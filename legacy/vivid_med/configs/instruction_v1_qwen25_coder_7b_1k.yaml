data:
  data_root: "./data/dataset"
  train_instruction_path: "./data/instructions/filtered/v1_label_to_qa/train.jsonl"
  val_instruction_path: "./data/instructions/filtered/v1_label_to_qa/val.jsonl"
  image_size: 224
  max_train_samples: 8000
  max_val_samples: 1000
  num_workers: 0
  prompt_template: "Question: {question}\nAnswer: "

model:
  vit_model_name: "vit_base_patch16_224"
  vit_pretrained: false
  vit_output_type: "all"
  num_prefix_tokens: 4
  projector_mlp_hidden_dim: 1536
  projector_dropout: 0.1
  llm_model_name: "H:/Xiyao_Wang/001_models/Qwen2.5-Coder-7B-Instruct"
  use_flash_attention: false
  max_text_length: 192

training:
  learning_rate: 1.0e-4
  vit_learning_rate: 2.0e-5
  projector_learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 100
  max_steps: 1000
  batch_size: 1
  eval_batch_size: 2
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  log_interval: 10
  eval_interval: 100
  save_interval: 250
  output_dir: "./outputs/instruction_runs/v1_qwen25_coder_7b_1k"

seed: 42
device: "cuda:0"

# Answerability ablation: null-as-negative UMS.
# Unanswerable/null finding states are serialized as "absent" and fully supervised.

data:
  data_root: "./data/dataset"
  train_ums_path: "./data/dataset/processed/chexpert_ums_train.jsonl"
  val_ums_path: "./data/dataset/processed/chexpert_ums_val.jsonl"
  selected_labels:
    - "Enlarged Cardiomediastinum"
    - "Cardiomegaly"
    - "Lung Opacity"
    - "Lung Lesion"
    - "Edema"
    - "Consolidation"
    - "Pneumonia"
    - "Atelectasis"
    - "Pneumothorax"
    - "Pleural Effusion"
    - "Fracture"
    - "Support Devices"
  image_size: 224
  max_val_samples: 1000
  num_workers: 4
  target_format: "json"
  json_null_state: "absent"

model:
  vit_model_name: "vit_base_patch16_224"
  vit_pretrained: true
  vit_output_type: "all"
  num_prefix_tokens: 4
  projector_mlp_hidden_dim: 1536
  projector_dropout: 0.1
  max_text_length: 256
  llm_model_name: "C:/Users/Admin/.cache/modelscope/hub/models/Qwen/Qwen2___5-1___5B-Instruct"

training:
  learning_rate: 1.0e-4
  vit_learning_rate: 2.0e-5
  projector_learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  max_steps: 10000
  batch_size: 4
  gradient_accumulation_steps: 8
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  log_interval: 10
  eval_interval: 500
  save_interval: 1000
  output_dir: "./outputs/ablation_ums_null_as_negative_12label"

evaluation:
  threshold: 0.5
  uncertain_policy: "ignore"

seed: 42
device: "cuda:0"

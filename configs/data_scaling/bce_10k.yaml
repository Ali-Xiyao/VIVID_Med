data:
  data_root: ./data/dataset
  train_ums_path: ./data/splits/chexpert_train_10k.jsonl
  val_ums_path: ./data/splits/chexpert_val_fixed.jsonl
  image_size: 224
  use_common_labels_only: false
  max_val_samples: 1000
  num_workers: 0
model:
  vit_model_name: vit_base_patch16_224
  vit_pretrained: true
  drop_rate: 0.0
  drop_path_rate: 0.0
training:
  learning_rate: 0.0001
  weight_decay: 0.01
  warmup_steps: 500
  max_steps: 10000
  batch_size: 32
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  log_interval: 10
  eval_interval: 500
  save_interval: 1000
  output_dir: ./outputs/data_scaling/bce_10k
evaluation:
  threshold: 0.5
  uncertain_policy: ignore
seed: 42
device: cuda

data:
  data_root: "."
  train_instruction_path: "./data/instructions/filtered/v3_mimic_report_grounded_counterfactual_train1k/train.jsonl"
  val_instruction_path: "./data/instructions/filtered/v3_mimic_report_grounded_counterfactual_val200/val.jsonl"
  image_size: 224
  max_train_samples: 16
  max_val_samples: 4
  num_workers: 0
  prompt_template: "Question: {question}\nAnswer: "

model:
  vit_model_name: "vit_base_patch16_224"
  vit_pretrained: false
  vit_output_type: "all"
  num_prefix_tokens: 4
  projector_mlp_hidden_dim: 1536
  projector_dropout: 0.1
  llm_model_name: "H:/Xiyao_Wang/001_models/Qwen2.5-Coder-7B-Instruct"
  use_flash_attention: false
  max_text_length: 256

training:
  learning_rate: 1.0e-4
  vit_learning_rate: 2.0e-5
  projector_learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 1
  max_steps: 2
  batch_size: 1
  eval_batch_size: 2
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  log_interval: 1
  eval_interval: 1
  save_interval: 2
  output_dir: "./outputs/instruction_runs/debug_v4_mimic_counterfactual_weighted_qwen25_coder_7b"
  token_weighting:
    enabled: true
    default_weight: 1.0
    normalize_sample_weights: true
    visual_dependency_weights:
      high: 3.0
      medium: 1.5
      low: 0.5
    answer_type_weights:
      counterfactual_choice: 2.0
      laterality_location: 2.0
      device_position: 2.0
      severity: 1.8
      temporal_comparison: 1.8
      evidence_phrase: 1.5
      uncertainty: 1.3
      report_consistency: 1.3
      finding_verification: 1.0
      answerability: 0.5

seed: 42
device: "cuda:0"

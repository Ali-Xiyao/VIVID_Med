# VIVID-Med V8: 强制 ViT 学习更好的表征
# 核心改动 vs V7:
#   1. vit_output_type: "all" (197 tokens) 而非 "cls" (1 token)
#   2. 分组学习率: ViT lr=2e-5, Projector lr=1e-4
#   3. 减小 Projector 容量: prefix_tokens 16→4, mlp_hidden_dim 3072→1536
#   4. 增加训练步数到 5000 (更多有效梯度)

data:
  data_root: "./data/dataset"
  train_ums_path: "./data/dataset/processed/chexpert_ums_train.jsonl"
  val_ums_path: "./data/dataset/processed/chexpert_ums_val.jsonl"
  image_size: 224
  use_common_labels_only: false
  selected_labels:
    - "Pleural Effusion"
    - "Support Devices"
    - "Lung Opacity"
    - "Edema"
    - "Pneumothorax"
    - "Consolidation"
    - "Atelectasis"
  max_train_samples: null
  max_val_samples: 1000
  num_workers: 4
  json_include_all_labels: true
  json_missing_state: null
  json_null_state: null
  train_dense_top_k: 10000
  train_dense_min_answerable: null
  val_dense_top_k: 1000
  val_dense_min_answerable: null

  field_query_training:
    enabled: true
    k_min: 2
    k_max: 3
    focus_labels:
      - "Pleural Effusion"
      - "Edema"
      - "Pneumothorax"
    focus_probability: 0.8
    label_sampling_weights:
      "Pleural Effusion": 3.0
      "Edema": 2.5
      "Pneumothorax": 2.5
      "Consolidation": 1.6
      "Atelectasis": 1.6
      "Lung Opacity": 1.2
      "Support Devices": 1.0
    prompt_template: |
      You are a medical imaging AI assistant.
      Output ONLY one valid JSON object with keys:
      modality, findings, study_view.
      modality must be "CXR".
      findings must include ONLY these labels: {label_list}.
      For each finding, output {"state": present|absent|uncertain|null, "score": null}.
      Do not output any labels outside this label list.
      study_view is AP, PA, LAT, or null.

model:
  vit_model_name: "vit_base_patch16_224"
  vit_pretrained: true
  vit_output_type: "all"              # V8: 输出全部 197 tokens (CLS + 196 patches)
  num_prefix_tokens: 4                # V8: 从 16 降到 4，减少 Projector 免费容量
  projector_dropout: 0.1
  projector_mlp_hidden_dim: 1536      # V8: 从 3072 降到 1536，削弱 Projector
  llm_model_name: "Qwen/Qwen2.5-1.5B-Instruct"
  use_flash_attention: true
  max_text_length: 448

training:
  learning_rate: 8.0e-5               # 基础 lr (Projector 使用)
  vit_learning_rate: 2.0e-5           # V8: ViT 使用更小的 lr，迫使缓慢但持续调整
  projector_learning_rate: 1.0e-4     # V8: Projector 使用更大的 lr，快速适配
  weight_decay: 0.01
  warmup_steps: 400
  max_steps: 5000                     # V8: 从 3500 增加到 5000
  lambda_rank: 0.0
  lambda_vdep: 0.0
  lambda_ans: 0.0
  batch_size: 4
  gradient_accumulation_steps: 8
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  log_interval: 10
  eval_interval: 250
  save_interval: 500
  output_dir: "./outputs/cxr_chexpert_v8_top7_gpu0"

  token_weighting:
    enabled: true
    default_weight: 1.0
    label_smoothing: 0.0
    state_weights:
      present: 6.0
      uncertain: 3.0
      absent: 1.4
      null: 0.0

  answerability_mask:
    enabled: true
    true_weight: 1.0
    true_weight_by_label:
      Pleural Effusion: 2.0
      Edema: 1.8
      Pneumothorax: 1.8
      Consolidation: 1.4
      Atelectasis: 1.4
    false_weight: 0.0
    scope: "findings_only"
    keep_structural_tokens: false

prompt:
  template: |
    You are a medical imaging AI assistant.
    Output ONLY one valid JSON object with keys:
    modality, findings, study_view.
    modality must be "CXR".
    findings must include ONLY these 7 labels:
    "Pleural Effusion", "Support Devices", "Lung Opacity", "Edema",
    "Pneumothorax", "Consolidation", "Atelectasis".
    For each finding, output {"state": present|absent|uncertain|null, "score": null}.
    study_view is AP, PA, LAT, or null.

evaluation:
  threshold: 0.5
  uncertain_policy: "ignore"
  pred_unknown_policy: "negative"

wandb:
  enabled: false
  project: "vivid-med"
  run_name: null

seed: 42
device: "cuda"

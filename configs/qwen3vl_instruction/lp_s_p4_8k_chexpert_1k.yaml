experiment:
  id: lp_s_p4_8k_chexpert_1k
  route: qwen3vl_p4v2_vision_linear_probe

data:
  data_root: "H:/Xiyao_Wang/000_Public Dataset"
  train_ums_path: "./data/splits/chexpert_train_1k.jsonl"
  val_ums_path: "./data/splits/chexpert_val_fixed.jsonl"
  use_common_labels_only: true
  max_train_samples: 1000
  max_val_samples: 1000
  num_workers: 0
  processor_prompt: "Classify the chest X-ray findings."

model:
  model_path: "H:/Xiyao_Wang/001_models/qwen3-vl-2b-thinking-new"
  dtype: "bf16"
  freeze_backbone: true
  vision_checkpoint: "./outputs/qwen3vl_instruction/s_p4_8k/checkpoints/best.pt"

training:
  learning_rate: 1.0e-3
  weight_decay: 0.01
  max_steps: 1000
  batch_size: 2
  eval_batch_size: 2
  uncertain_policy: "ignore"
  log_interval: 25
  eval_interval: 250
  save_interval: 500
  output_dir: "./outputs/qwen3vl_p4v2_lp_runs/s_p4_8k_chexpert_1k"

seed: 44
device: "cuda:1"

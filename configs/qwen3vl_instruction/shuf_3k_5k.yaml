experiment:
  id: shuf_3k_5k
  run_id: SHUF-3k
  route: p4v2_hard_image_shuffle
  data_version: D7_hard_shuffle_3k

data:
  data_root: "."
  train_instruction_path: "./outputs/instruction_data/glm_validated/d7_hard_shuffle_3k.jsonl"
  val_instruction_path: "./outputs/instruction_data/glm_validated/d7_hard_shuffle_val200.jsonl"
  max_length: 768
  num_workers: 0

model:
  model_path: "H:/Xiyao_Wang/001_models/qwen3-vl-2b-thinking-new"
  dtype: "bf16"
  trainable_groups:
    - vision_tower
    - visual_connector

training:
  learning_rate: 2.0e-5
  vision_learning_rate: 1.0e-5
  connector_learning_rate: 2.0e-5
  weight_decay: 0.01
  max_steps: 5000
  batch_size: 1
  eval_batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  log_interval: 25
  eval_interval: 500
  save_interval: 1000
  save_checkpoints: true
  image_shuffle_margin:
    enabled: true
    weight: 0.1
    margin: 0.2
  output_dir: "./outputs/qwen3vl_instruction/shuf_3k_5k"

seed: 42
device: "cuda:1"

experiment:
  id: shuf_k4_tw_visual_seed2
  run_id: SHUF-K4-TW-visual-seed2
  route: shuf_plus_multi_negative_tw
  data_version: SHUF-K4-TW-visual
data:
  data_root: .
  train_instruction_path: ./outputs/instruction_data/next_stage/shuf_k4_train.jsonl
  val_instruction_path: ./outputs/instruction_data/next_stage/shuf_k4_val.jsonl
  max_length: 768
  max_val_samples: 1000
  num_workers: 0
model:
  model_path: H:/Xiyao_Wang/001_models/qwen3-vl-2b-thinking-new
  dtype: bf16
  trainable_groups:
  - vision_tower
  - visual_connector
training:
  learning_rate: 2.0e-05
  vision_learning_rate: 1.0e-05
  connector_learning_rate: 2.0e-05
  weight_decay: 0.01
  max_steps: 5000
  batch_size: 1
  eval_batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  log_interval: 25
  eval_interval: 500
  save_interval: 1000
  save_checkpoints: true
  output_dir: H:/Xiyao_Wang/021_260129VIVID/outputs/qwen3vl_case_study_multiseed/shuf_k4_tw_visual_seed2
  loss_weighting:
    enabled: true
    base_weight: 1.0
    answer_type_weights:
      same_question_different_answer: 2.0
      counterfactual_choice: 1.8
      laterality_location: 2.0
      finding_verification: 1.2
      uncertainty: 1.5
      answerability: 1.2
    visual_dependency_weights:
      very_high: 2.0
      high: 1.5
      medium: 1.0
      low: 0.7
    quality_flag_weights:
      hard_image_shuffle: 2.0
      multi_negative_k4: 1.2
      same_question: 1.3
  image_shuffle_margin:
    enabled: true
    weight: 0.15
    margin: 0.2
seed: 2
device: cuda:0

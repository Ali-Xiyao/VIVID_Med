experiment:
  id: bives_cxr_qwen35_2b_p0
  route: BiVES-CXR
  phase: P0

data:
  data_root: /ipfs/inspurfileset/home/dqxy/dqxy11/projects/xiyaowang/021_260129VIVID/data
  train_manifest: data/bives_cxr/manifests/p0_train.jsonl
  val_manifest: data/bives_cxr/manifests/p0_val.jsonl
  calibration_manifest: data/bives_cxr/manifests/p0_calibration.jsonl
  test_manifest: data/bives_cxr/manifests/p0_test.jsonl
  image_size: 448
  max_train_samples: 256
  max_val_samples: 128
  num_workers: 2

model:
  family: Qwen3.5
  scale: 2B
  path: /ipfs/inspurfileset/home/dqxy/dqxy11/projects/xiyaowang/model/Qwen3.5-2B
  dtype: bf16
  attention_implementation: eager
  freeze_backbone: true
  statement_dim: 256
  statement_embeddings:
    mode: frozen_cached
    path: data/bives_cxr/statement_embeddings/qwen35_canonical.pt

bives:
  fusion_dim: 256
  evidence_max: 8.0
  contextual_layers: 1
  contextual_heads: 4
  contextual_dropout: 0.0
  mask:
    type: soft_topk
    topk: 16
    temperature: 0.5
  decoder:
    tau_a: 1.0
    tau_d: 1.0
    tau_p: 1.0
  interventions:
    replacement: zero
    num_controls: 4
    control_mode: random_disjoint

sampling:
  type: same_statement_state_group
  states: [support, contradict, uncertain, insufficient]
  groups_per_batch: 1
  require_complete_groups: true

audit:
  check_images: true
  check_decodable: true
  reject_constant_images: true
  require_complete_statements: true
  require_provenance: true
  verify_image_sha256: true

loss:
  lambda_ies: 0.5
  lambda_nec: 1.0
  lambda_ctrl: 0.5
  lambda_pair: 0.1
  pair_margin: 0.2
  lambda_u_pol: 0.1
  lambda_i_mag: 0.1
  lambda_min: 0.0
  lambda_tv: 0.0001

evaluation:
  batch_size: 8
  run_calibration: true
  run_test: false
  selection_metric: nll
  selection_mode: min
  calibration_max_iter: 100
  bootstrap_replicates: 1000

training:
  lr_new_layers: 0.0001
  lr_backbone: 0.00001
  weight_decay: 0.05
  max_steps: 100
  gradient_accumulation_steps: 1
  eval_interval: 20
  max_grad_norm: 1.0
  output_dir: outputs/bives_cxr/qwen35_2b_p0

seed: 17
device: cuda:0

experiment:
  id: bives_cxr_qwen35_4b_main
  route: BiVES-CXR
  phase: P1
  mode: local_formal

data:
  data_root: data
  train_manifest: data/bives_cxr/manifests/train_locked.jsonl
  val_manifest: data/bives_cxr/manifests/val_locked.jsonl
  calibration_manifest: data/bives_cxr/manifests/calibration_locked.jsonl
  test_manifest: data/bives_cxr/manifests/test_locked.jsonl
  dataset_lock: data/bives_cxr/locks/formal_dataset_lock.json
  image_size: 448
  num_workers: 4

model:
  family: Qwen3.5
  scale: 4B
  path: H:/Xiyao_Wang/001_models/Qwen3.5-4B
  dtype: bf16
  attention_implementation: eager
  freeze_backbone: true
  statement_embeddings:
    mode: frozen_cached
    path: data/bives_cxr/statement_embeddings/qwen35_canonical.pt
    expected_sha256: LOCK_AFTER_BUILD
    expected_vocabulary_sha256: LOCK_AFTER_BUILD
    expected_pooling: input_embedding_mean

bives:
  fusion_dim: 512
  evidence_max: 8.0
  contextual_layers: 1
  contextual_heads: 4
  contextual_dropout: 0.0
  mask:
    type: soft_topk
    topk: 16
    temperature: 0.5
  decoder:
    type: monotone_bipolar_conditional
    tau_a: 1.0
    tau_p: 1.0
    uncertainty_mass: 1.0
  interventions:
    replacement: zero
    num_controls: 4
    control_mode: random_disjoint

sampling:
  type: same_statement_state_group
  states: [support, contradict, uncertain, insufficient]
  groups_per_batch: 2
  require_complete_groups: true

audit:
  check_images: true
  check_decodable: true
  reject_constant_images: true
  require_complete_statements: true
  require_provenance: true
  require_matching_protocol: true
  require_both_insufficient_kinds: true
  verify_image_sha256: true

loss:
  lambda_ies: 0.5
  lambda_nec: 1.0
  lambda_ctrl: 0.5
  lambda_pair: 0.1
  pair_margin: 0.2
  lambda_u_pol: 0.1
  lambda_i_mag: 0.1
  lambda_min: 0.0
  lambda_tv: 0.0001

evaluation:
  control_seed: 20260717
  bootstrap_seed: 20260718
  batch_size: 8
  run_calibration: true
  run_test: false
  selection_metric: nll
  selection_mode: min
  calibration_max_iter: 100
  bootstrap_replicates: 1000

training:
  lr_new_layers: 0.0001
  lr_backbone: 0.00001
  weight_decay: 0.05
  max_steps: 1000
  gradient_accumulation_steps: 1
  eval_interval: 100
  max_grad_norm: 1.0
  output_dir: outputs/bives_cxr/qwen35_4b_main

seed: 17
device: cuda:0

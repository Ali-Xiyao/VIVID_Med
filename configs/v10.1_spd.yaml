# V10.1: SPD (Structured Prediction Decomposition)
# 多组 cross-attention query tokens 从 ViT 特征中提取不同方面信息
# 正交性损失迫使各组关注不同区域
# 不使用 SAR / HFP / GFTM / Consistency

data:
  data_root: "./data/dataset"
  train_ums_path: "./data/dataset/processed/chexpert_ums_train.jsonl"
  val_ums_path: "./data/dataset/processed/chexpert_ums_val.jsonl"
  selected_labels:
    - "Pleural Effusion"
    - "Support Devices"
    - "Lung Opacity"
    - "Edema"
    - "Pneumothorax"
    - "Consolidation"
    - "Atelectasis"
  image_size: 224
  max_val_samples: 1000
  num_workers: 4

model:
  vit_model_name: "vit_base_patch16_224"
  vit_pretrained: true
  vit_output_type: "all"
  num_prefix_tokens: 4  # SPD 会覆盖此值
  projector_mlp_hidden_dim: 1536
  projector_dropout: 0.1
  llm_model_name: "Qwen/Qwen2.5-1.5B-Instruct"

  gftm:
    enabled: false
  consistency:
    enabled: false
  sar:
    enabled: false
  hfp:
    enabled: false
  spd:
    enabled: true
    num_groups: 3        # 3 组 query tokens (结构/发现/细节)
    tokens_per_group: 2  # 每组 2 个 token → 共 6 个 SPD tokens
    ortho_weight: 0.01   # 正交性损失权重

training:
  learning_rate: 1.0e-4
  vit_learning_rate: 2.0e-5
  projector_learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  max_steps: 10000
  batch_size: 4
  gradient_accumulation_steps: 8
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  log_interval: 10
  eval_interval: 500
  save_interval: 1000
  output_dir: "./outputs/v10.1_spd"

evaluation:
  threshold: 0.5
  uncertain_policy: "ignore"

seed: 42
device: "cuda:0"

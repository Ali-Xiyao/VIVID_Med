# Baseline ViT classifier for CheXpert (multi-label)

data:
  data_root: "./data/dataset"
  train_ums_path: "./data/dataset/processed/chexpert_ums_train.jsonl"
  val_ums_path: "./data/dataset/processed/chexpert_ums_val.jsonl"
  image_size: 224
  use_common_labels_only: false
  max_train_samples: null
  max_val_samples: 1000
  num_workers: 4

model:
  vit_model_name: "vit_base_patch16_224"
  vit_pretrained: true
  drop_rate: 0.0
  drop_path_rate: 0.1

training:
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  max_steps: 10000
  batch_size: 16
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  log_interval: 10
  eval_interval: 500
  save_interval: 1000
  output_dir: "./outputs/baseline_vit_v2"

evaluation:
  threshold: 0.5
  uncertain_policy: "ignore"  # ignore | positive | negative

seed: 42
device: "cuda"

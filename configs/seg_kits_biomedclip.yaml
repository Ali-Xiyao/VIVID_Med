# KiTS21 Segmentation Transfer: BiomedCLIP baseline
# BiomedCLIP ViT-B/16 预训练权重

data:
  data_root: "./data/dataset"
  train_ums_path: "./data/dataset/processed/kits_ums_train.jsonl"
  val_ums_path: "./data/dataset/processed/kits_ums_val.jsonl"
  image_size: 224
  num_workers: 4
  subset_fraction: null

model:
  vit_model_name: "vit_base_patch16_224"
  vit_pretrained: false
  num_seg_classes: 4

transfer:
  init_vit_checkpoint: "./pretrained/biomedclip_vit_base.pt"

training:
  learning_rate: 1.0e-4
  backbone_learning_rate: 1.0e-5
  head_learning_rate: 1.0e-3
  weight_decay: 0.01
  warmup_steps: 500
  max_steps: 15000
  batch_size: 8
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  log_interval: 50
  eval_interval: 500
  save_interval: 2500
  output_dir: "./outputs/seg_kits_biomedclip"

seed: 42
device: "cuda"
